<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChompCheck</title>

  <!-- design code for styling requested from Claude Anthropic based on a simple green (healthy) and black color scheme -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Start of camera section -->
  <!-- ZXing library for QR code scanning  -->
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>

</head>
<body>

  <nav>
    <div>
      <div class="logo">Chomp<span class="check">Check</span></div>
      <div class="tagline">Scan it. Know it!</div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('scan')">Scan</button>
      <button class="nav-tab" onclick="showPage('tracker')">Tracker</button>
      <button class="nav-tab" onclick="showPage('goals')">Goals</button>
    </div>
  </nav>

<!-- placeholders for scan, tracker, and goals -->
  <div class="page active" id="page-scan">
    <h2>Scan</h2>
    <p>Scanner will go here</p>
  </div>

  <div class="page" id="page-tracker">
    <h2>Tracker</h2>
    <p>Monthly log will go here</p>
  </div>

  <div class="page" id="page-goals">
    <h2>Goals</h2>
    <p>Goal settings will go here</p>
  </div>

  <div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toast-msg"></span>
</div>

<div class="card">
        <div class="card-label">Nutrition Results</div>
        <div id="results-empty" style="padding:3rem 1rem;text-align:center;color:#6b7280;">
          <div style="font-size:0.9rem;">Scan a barcode to see nutrition info</div>
          <div style="font-size:0.78rem;margin-top:6px;">Works with any packaged food product</div>
        </div>
        <div id="results-content" style="display:none;">
          <div class="result-card">
            <div class="result-header">
              <div>
                <div class="product-name" id="res-product">—</div>
                <div class="product-brand" id="res-brand"></div>
              </div>
              <div class="serving-badge" id="res-serving">Per 100g</div>
            </div>
            <div class="macro-grid">
              <div class="macro-item calories">
                <div class="macro-label">Calories</div>
                <div class="macro-value" id="res-cal">—</div>
                <div class="macro-dv" id="res-cal-dv"></div>
              </div>
              <div class="macro-item protein">
                <div class="macro-label">Protein</div>
                <div class="macro-value" id="res-prot">—</div>
                <div class="macro-dv" id="res-prot-dv"></div>
              </div>
              <div class="macro-item sat-fat">
                <div class="macro-label">Saturated Fat</div>
                <div class="macro-value" id="res-satfat">—</div>
                <div class="macro-dv" id="res-satfat-dv"></div>
              </div>
              <div class="macro-item sugar">
                <div class="macro-label">Total Sugar</div>
                <div class="macro-value" id="res-sugar">—</div>
                <div class="macro-dv" id="res-sugar-dv"></div>
              </div>
            </div>
            <div class="nutrient-extras" id="nutrient-extras"></div>
            <div class="goal-fit good" id="goal-fit-box">
              <div class="goal-fit-label" id="goal-fit-label">Goal Alignment</div>
              <div class="goal-fit-text" id="goal-fit-text">—</div>
            </div>
            <button class="btn btn-primary" onclick="logCurrentScan()">Add to Monthly Log</button>
            <button class="btn btn-secondary" onclick="resetScan()">Scan Another</button>
          </div>
        </div>
      </div>
    <script src="javascript/app.js"></script>
</body>
</html>
