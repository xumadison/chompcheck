<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChompCheck</title>

  // design code for styling requested from Claude Anthropic based on a simple green (healthy) and black color scheme
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0a0f0a;
      color: #f0fdf4;
      min-height: 100vh;
    }

    nav {
      padding: 0.85rem 1.5rem;
      border-bottom: 1px solid rgba(74,222,128,0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0a0f0a;
      position: sticky;
      top: 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
    }

    .logo .check {
      color: #4ade80;
    }

    .tagline {
      font-size: 0.62rem;
      letter-spacing: 0.13em;
      color: #6b7280;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .tagline .nom {
      color: #86efac;
      font-weight: 600;
    }

    .nav-tabs {
      display: flex;
      gap: 4px;
      background: #111611;
      border-radius: 10px;
      padding: 4px;
    }

    .nav-tab {
      padding: 6px 14px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      color: #6b7280;
      border: none;
      background: none;
      font-family: 'Space Grotesk', sans-serif;
    }

    .nav-tab.active {
      background: #166534;
      color: #4ade80;
    }

    /*page content styling*/

    .page {
      display: none;
      padding: 1.5rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .page.active {
      display: block;
    }

  </style>
</head>
<body>

  <nav>
    <div>
      <div class="logo">Chomp<span class="check">Check</span></div>
      <div class="tagline">Scan it. Know it!</div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('scan')">Scan</button>
      <button class="nav-tab" onclick="showPage('tracker')">Tracker</button>
      <button class="nav-tab" onclick="showPage('goals')">Goals</button>
    </div>
  </nav>

  // placeholders for scan, tracker, and goals 
  <div class="page active" id="page-scan">
    <h2>Scan</h2>
    <p>Scanner will go here</p>
  </div>

  <div class="page" id="page-tracker">
    <h2>Tracker</h2>
    <p>Monthly log will go here</p>
  </div>

  <div class="page" id="page-goals">
    <h2>Goals</h2>
    <p>Goal settings will go here</p>
  </div>


  <script>
    function showPage(p) {
      document.querySelectorAll('.page').forEach(function(el) {
        el.classList.remove('active');
      });
      document.querySelectorAll('.nav-tab').forEach(function(el) {
        el.classList.remove('active');
      });
      document.getElementById('page-' + p).classList.add('active');
      var tabs = document.querySelectorAll('.nav-tab');
      var pages = ['scan', 'tracker', 'goals'];
      tabs[pages.indexOf(p)].classList.add('active');
    }
  </script>
</body>
</html>
