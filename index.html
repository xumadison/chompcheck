<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChompCheck</title>

  // design code for styling requested from Claude Anthropic based on a simple green (healthy) and black color scheme
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0a0f0a;
      color: #f0fdf4;
      min-height: 100vh;
    }

    nav {
      padding: 0.85rem 1.5rem;
      border-bottom: 1px solid rgba(74,222,128,0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0a0f0a;
      position: sticky;
      top: 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
    }

    .logo .check {
      color: #4ade80;
    }

    .tagline {
      font-size: 0.62rem;
      letter-spacing: 0.13em;
      color: #6b7280;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .tagline .nom {
      color: #86efac;
      font-weight: 600;
    }

    .nav-tabs {
      display: flex;
      gap: 4px;
      background: #111611;
      border-radius: 10px;
      padding: 4px;
    }

    .nav-tab {
      padding: 6px 14px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      color: #6b7280;
      border: none;
      background: none;
      font-family: 'Space Grotesk', sans-serif;
    }

    .nav-tab.active {
      background: #166534;
      color: #4ade80;
    }
  </style>
</head>
<body>

  <nav>
    <div>
      <div class="logo">Chomp<span class="check">Check</span></div>
      <div class="tagline">Scan it. Know it!</div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('scan')">Scan</button>
      <button class="nav-tab" onclick="showPage('tracker')">Tracker</button>
      <button class="nav-tab" onclick="showPage('goals')">Goals</button>
    </div>
  </nav>

</body>
</html>
